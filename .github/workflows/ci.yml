name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build-test:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/estoque_vinhos?schema=public
      AUTH_SECRET: ci-auth-secret-with-at-least-32-characters
      APP_URL: http://localhost:3000
      APP_TIMEZONE: America/Sao_Paulo
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Run tests
        run: npm test -- --run

      - name: Build
        run: npm run build
